groups:
  - name: url_shortener_alerts
    rules:
      - alert: ServiceDown
        expr: up{job="url-shortener"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "URL Shortener is DOWN"
          description: "The service has been unreachable for more than 1 minute."

      - alert: HighErrorRate
        expr: |
          rate(flask_http_request_total{status=~"5.."}[5m]) /
          rate(flask_http_request_total[5m]) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High 5xx error rate"
          description: "Error rate above 5% for 2 minutes."

      - alert: HighLatency
        expr: |
          histogram_quantile(0.95,
            rate(flask_http_request_duration_seconds_bucket[5m])
          ) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High p95 latency"
          description: "p95 latency above 1 second for 5 minutes."
