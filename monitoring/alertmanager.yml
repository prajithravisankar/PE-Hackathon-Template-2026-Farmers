global:
  resolve_timeout: 5m

route:
  group_by: ["alertname"]
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: "discord"

receivers:
  - name: "discord"
    discord_configs:
      - webhook_url: "https://discord.com/api/webhooks/placeholder"
        title: "{{ .GroupLabels.alertname }}"
        message: "{{ range .Alerts }}{{ .Annotations.description }}{{ end }}"
